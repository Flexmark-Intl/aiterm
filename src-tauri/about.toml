# cargo-about configuration for collecting Rust dependency licenses
accepted = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
    "MPL-2.0",
    "LicenseRef-Proprietary",
]

# Ignore the workspace crate itself
ignore-build-dependencies = true
ignore-dev-dependencies = true
